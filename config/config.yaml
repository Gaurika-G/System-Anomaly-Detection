data:
  raw_train: "data/UNSW-NB15_c/UNSW_NB15_training-set.csv"
  raw_test: "data/UNSW-NB15_c/UNSW_NB15_testing-set.csv"
  processed_train: "outputs/processed_train.parquet"
  processed_test: "outputs/processed_test.parquet"
  encoder_path: "outputs/encoders.pkl"
  model_path: "outputs/model.pkl"
  results_path: "outputs/evaluation_results.csv"

preprocessing:
  missing_value_strategy: "median"
  drop_columns: ["id", "attack_cat"]
  target_column: "label"

model:
  n_estimators: 200
  max_samples: "auto"
  random_state: 42
  contamination_search: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30]

features:
  categorical_columns:
    - "proto"
    - "service"
    - "state"
  numeric_columns:
    - "dur"
    - "spkts"
    - "dpkts"
    - "sbytes"
    - "dbytes"
    - "rate"
    - "sttl"
    - "dttl"
    - "sload"
    - "dload"
    - "sloss"
    - "dloss"
    - "sinpkt"
    - "dinpkt"
    - "sjit"
    - "djit"
    - "swin"
    - "stcpb"
    - "dtcpb"
    - "dwin"
    - "tcprtt"
    - "synack"
    - "ackdat"
    - "smean"
    - "dmean"
    - "trans_depth"
    - "response_body_len"
    - "ct_srv_src"
    - "ct_state_ttl"
    - "ct_dst_ltm"
    - "ct_src_dport_ltm"
    - "ct_dst_sport_ltm"
    - "ct_dst_src_ltm"
    - "is_ftp_login"
    - "ct_ftp_cmd"
    - "ct_flw_http_mthd"
    - "ct_src_ltm"
    - "ct_srv_dst"
    - "is_sm_ips_ports"

logging:
  level: "INFO"
  log_file: "logs/pipeline.log"

